apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  source:
    path: ./k8s/auth-service
    repoURL: https://github.com/simonkotz/dhbw-devops
    targetRevision: HEAD
  sources: []
  project: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true
      enabled: true
