apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
spec:
  project: default
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  sources:
    - repoURL: https://grafana-community.github.io/helm-charts
      targetRevision: 2.6.2
      chart: tempo-distributed
      helm:
        valueFiles:
          - $values/k8s/argo-lgtm-apps/values/tempo-values.yaml
    - repoURL: https://github.com/simonkotz/dhbw-devops
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true