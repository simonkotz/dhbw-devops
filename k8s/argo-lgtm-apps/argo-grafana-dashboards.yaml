apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboards
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/simonkotz/dhbw-devops.git
    targetRevision: main
    path: k8s/argo-lgtm-apps/dashboards
  project: default
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true