sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local:80
        access: proxy
        isDefault: true
      - name: Loki
        type: loki
        url: http://loki-gateway.monitoring.svc.cluster.local:80
        access: proxy
      - name: Tempo
        type: tempo
        url: http://tempo-gateway.monitoring.svc.cluster.local:80
        access: proxy