name: Publish

# Triggered by tags from Release-Please (e.g., auth-service-1.0.0)
on:
  push:
    tags:
    - '[0-9]+.[0-9]+.[0-9]+'
    - '[A-Za-z0-9]+-service-[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Get the code
      - name: Checkout code
        uses: actions/checkout@v6

      # Extract service name and version from tag
      - name: Get service name and version
        id: service
        run: |
          echo "service=$(echo ${{ github.ref }} | cut -d '/' -f 3 | cut -d '-' -f 1-2)" >> $GITHUB_OUTPUT
          echo "version=$(echo ${{ github.ref }} | cut -d '/' -f 3 | cut -d '-' -f 3)" >> $GITHUB_OUTPUT

      # Debug output
      - name: Print service and version
        run: |
          echo "Service: ${{ steps.service.outputs.service }}"
          echo "Version: ${{ steps.service.outputs.version }}"

      # Login to registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Setup Docker build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.alpine
          push: true
          build-args: |
            SERVICE=${{ steps.service.outputs.service }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.service.outputs.service }}:${{ steps.service.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ steps.service.outputs.service }}:latest