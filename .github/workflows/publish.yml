name: Publish

# Triggered by tags from Release-Please (e.g., auth-service-1.0.0)
on:
  push:
    tags:
    - '[0-9]+.[0-9]+.[0-9]+'
    - '[A-Za-z0-9]+-service-[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Get the code
      - name: Checkout code
        uses: actions/checkout@v6

      # Extract service name and version from tag
      - name: Get service name and version
        id: service
        run: |
          echo "service=$(echo ${{ github.ref }} | cut -d '/' -f 3 | cut -d '-' -f 1-2)" >> $GITHUB_OUTPUT
          echo "version=$(echo ${{ github.ref }} | cut -d '/' -f 3 | cut -d '-' -f 3)" >> $GITHUB_OUTPUT

      # Debug output
      - name: Print service and version
        run: |
          echo "Service: ${{ steps.service.outputs.service }}"
          echo "Version: ${{ steps.service.outputs.version }}"

      # Login to registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Setup Docker build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v3

      # Build and push image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.alpine
          push: true
          build-args: |
            SERVICE=${{ steps.service.outputs.service }}
          platforms: linux/amd64, linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.service.outputs.service }}:${{ steps.service.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ steps.service.outputs.service }}:latest

      #Generate SBOM from the pushed image
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ steps.service.outputs.service }}:${{ steps.service.outputs.version }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: ${{ steps.service.outputs.service }}-${{ steps.service.outputs.version }}-sbom
          upload-release-assets: false 

      # Scan SBOM for CVEs with Grype
      - name: Scan SBOM for CVEs with Grype
        uses: anchore/scan-action@v3
        with:
          sbom: sbom.cyclonedx.json
          fail-build: false
          severity-cutoff: high
